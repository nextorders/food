name: Docker web-app

on:
  push:
    paths:
      - apps/web-app/**
      - packages/**
      - docker/web-app/**
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Github Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/web-app/Dockerfile
          push: true
          build-args: |
            VERSION=nightly
          tags: ghcr.io/${{ github.repository }}/web-app:nightly
